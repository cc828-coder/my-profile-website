baseURL: /
title: "Xinyi Chen (Crystal)"
languageCode: en-us
theme: tailbliss
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Xinyi Chen (Crystal)
  authorimage: ../assets/images/global/author.webp
  og_image: /images/tailbliss-cover.png
  moto: "UCL & Edinburgh Alumna | Energy & Macro Strategist | Ex-Energy Aspects & Petroineos | TTPS Holder"
  description: "Research Analyst with 2+ years of London-based experience in multi-asset demand forecasting and fundamental modeling. Leveraging a dual background in BSc Mathematics and MSc Sustainable Economics to deliver data-driven market outlooks. Expert in synthesizing complex macroeconomic indicators into actionable trading intelligence for global energy markets."
  disable_theme_toggle: false
  disable_stay_uptodate: true

  # Education / Credentials Section
  p1:
    heading: "Academic Background"
    description: "Bridging the gap between mathematical rigor and sustainable economic frameworks to decode the future of global resources"
    content:
      - text: "**University College London (UCL)** | QS World Rank #9  \nMSc in Sustainable Resources: Economics, Policy & Transitions — specialized in global resource economics and energy transition analytics."
      - text: "**University of Edinburgh** | QS World Rank #27  \nBachelor of Science in Mathematics and Business — developed advanced statistical modeling and quantitative reasoning for market analysis."
    logos:
      - identifier: ucl
        alt: "UCL"
      - identifier: edinburgh
        alt: "University of Edinburgh"

  # Professional Journey Section
  p2:
    heading: "Professional Journey"
    description: "A track record of delivering high-conviction market insights and strategic analysis across various sectors."
    experience:
      - company: "Energy Aspects"
        logo: "energy-aspects"
        period: "May 2024 - Nov 2025"
        role: "Analyst"
        details: "Optimised global demand forecasting for 90+ countries; delivered high-accuracy S&D outlooks for strategic trade decision-making."
      - company: "CTRL SPACES (Start-up)"
        logo: "ctrl-spaces"
        period: "Jan 2024 - May 2024"
        role: "Energy & Sustainability Analyst"
        details: "Analysed energy usage for 70+ companies; managed BREEAM assessments and Scope 1,2,3 emissions monitoring."
      - company: "Petroineos (PetroChina)"
        logo: "petroineos"
        period: "Jul 2023 - Sep 2023"
        role: "Summer Analyst"
        details: "Designed a dynamic demand model improving historical analysis accuracy by 12.5% for refined oil products."
      - company: "JingDong (JD.com)"
        logo: "jd"
        period: "May 2021 - Jul 2021"
        role: "Strategy & Operation Intern"
        details: "Led the environmental Trade-in project, achieving a 50% increase in user conversion rate through market research."
      - company: "Tencent"
        logo: "tencent"
        period: "Mar 2021 - May 2021"
        role: "Business Development Analyst Intern"
        details: "Built platform ecology models from 0-1 and contributed to a 17% increase in app downloads via influencer CRM."
        
  # Skillset Radar Section
  p3:
    heading: "Core Competencies & Skillsets"
    description: "Combining quantitative toolkits with sector-specific intelligence to transform market noise into clear, tradable signals."
    # 雷达图的分数 (1-100)，建议根据你的简历强项设定
    chart_data:
      - label: "Quant Modeling"
        value: 87
      - label: "Market Intel"
        value: 93
      - label: "Programming"
        value: 85
      - label: "Stakeholder"
        value: 92
      - label: "Strategy"
        value: 87
    # 右侧列表内容
    skills:
      - title: "Quantitative Modeling & Macro Analytics"
        desc: "Advanced mathematical and economic foundation for developing multi-asset demand frameworks and optimizing model accuracy."
      - title: "Fundamental Market Intelligence"
        desc: "Deep expertise in supply-demand (S&D) forecasting across 90+ countries and various fuels (Oil, Gas, Power & Renewables), delivering high-conviction insights into global energy balances and cross-fuel substitution dynamics."
      - title: "Advanced Programming Suite"
        desc: "Proficient in Python, SQL, R, and LaTeX to automate data pipelines and generate high-quality research."
      - title: "Stakeholder Engagement & Presentation"
        desc: "Proven ability to synthesize complex insights for clients and engage large-scale audiences of up to 19,000 in the public."
      - title: "Strategic Operations & Logic"
        desc: "Demonstrated success in platform ecology modeling and driving user conversion through data-backed strategies."

  # Portfolio / Projects Section
  p4:
    heading: "Selected Analysis Portfolios"
    description: "Visualizing complex energy data into actionable insights through professional reporting and dashboard design."
    items:
      - image: "/assets/images/portfolio/ppt-1.png"
        title: "Global Marine Fuel Outlook"
      - image: "/assets/images/portfolio/ppt-2.png"
        title: "SAF Mandate on Supply-Demand Dynamics"
      - image: "/assets/images/portfolio/ppt-3.png"
        title: "Decarbonization of the aviation industry"
      - image: "/assets/images/portfolio/ppt-4.png"
        title: "FuelEU Maritime Policy Impact Analysis"
  

  # Blog Section (For your Daily Insights)
  p5:
    heading: "Past Project Experience"
    description: "Deep-dive into quantitative models and strategic analysis across aviation and energy sectors."
    projects:
      - title: "Long-term Transportation Fuel Demand Modelling"
        image: "/assets/images/portfolio/pic-1.jpg" # 请确保图片名对应
        tag: "Macro Analysis"
        details: "Designed a sophisticated forecasting bottom-up framework using Markov Chain models to simulate long-term transitions in the global shipping and aviation sector, quantifying the impact of evolving policies on regional demand."
      - title: "SAF Mandate Impact on European Aviation Fuel Demand"
        image: "/assets/images/portfolio/pic-2.jpg"
        tag: "Modelling"
        details: "Led a comprehensive analysis of global aviation demand by synthesizing macroeconomic indicators and environmental regulations across 90+ jurisdictions to provide strategic market outlooks."
      - title: "Energy Trading Risk & Performance Monitoring"
        image: "/assets/images/portfolio/pic-3.jpg"
        tag: "Risk Management"
        details: "Monitored real-time risk exposures, Greeks, and daily P&L for complex energy portfolios, ensuring reporting accuracy and operational integrity within a high-pressure trading environment."

  # Contact / Newsletter Section  p6:
  p6:
    heading: "Ready to Start a Conversation?"
    description: "I am currently open to new opportunities and collaborations in Analytics and Quantitative Finance. Let's connect."
    email: "crystalchen828@email.com" 
    linkedin_url: "https://www.linkedin.com/in/crystal-c-5009a4182/"
    cv_url: "/assets/Xinyi Chen_cv.pdf" # 确保 PDF 存放在 static/assets/ 文件夹下

